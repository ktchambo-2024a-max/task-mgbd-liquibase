services:
  db:
    image: postgres:15
    container_name: liquibase_db
    environment:
      POSTGRES_DB: liquibase_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  liquibase:
    image: liquibase/liquibase
    container_name: liquibase_app
    depends_on:
      - db
    volumes:
      - .:/liquibase/changelog
      - ./drivers:/liquibase/lib
    working_dir: /liquibase/changelog
    